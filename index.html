<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">



</head>
<body>
<div class="app">
    <header class="top">
        <div>
            <h1 class="brand">Movie Finder</h1>

        </div>
    </header>

    <form class="bar">
        <div class="field">
            <label for="movieName">Movie</label>
            <input id="movieName" type="text" placeholder="e.g. Interstellar" />
        </div>

        <div class="field">
            <label for="movieYears">Year</label>
            <div class="selectWrap">
                <select id="movieYears"></select>
            </div>
        </div>

        <button id="searchMovie" class="primary" type="button">Search</button>
    </form>

    <button id="clearedMoviesSearch">Clear all previous searches</button>

    <section class="panel">
        <div class="panelHead">
            <h2>Recent searches</h2>
        </div>
        <div id="existingMoviesSearch" class="chips"></div>
    </section>

    <section class="panel">
        <div class="panelHead">
            <h2>Results</h2>
        </div>
        <div id="movieList" class="grid"></div>
    </section>
</div>

<div id="movieModal" class="modal hidden">
    <div id="modalContent">
        <button id="closeModal" class="closeBtn" type="button">✕</button>
        <div id="modalBody"></div>
    </div>
</div>
<script src="dist/bundle.js"></script>
</body>
</html>
